name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ""
            name: macOS
          - platform: ubuntu-22.04
            args: ""
            name: Linux

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "All-In ${{ github.ref_name }}"
          releaseBody: |
            Offline Texas Hold'em training for macOS and Linux.

            **Downloads**
            - macOS (Apple Silicon): `.dmg` with `aarch64` in the name
            - macOS (Intel): `.dmg` with `x86_64` in the name
            - Linux: `.deb` and `.AppImage`

            Built by [gapp](https://www.gapp.in) · [Project site](https://ganeshapp.github.io/allin/)
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
